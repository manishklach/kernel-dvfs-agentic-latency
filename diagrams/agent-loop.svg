<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <style>
      .node { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 20; }
      .text { font-family: -apple-system, system-ui, sans-serif; font-size: 14px; fill: #0f172a; text-anchor: middle; font-weight: 500; }
      .arrow { stroke: #3b82f6; stroke-width: 2; fill: none; }
      .arrowhead { fill: #3b82f6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrowhead" />
    </marker>
  </defs>

  <rect x="50" y="70" width="100" height="40" class="node" />
  <text x="100" y="95" class="text">Wait</text>

  <path d="M 150 90 L 200 90" class="arrow" marker-end="url(#arrow)" />

  <rect x="210" y="70" width="100" height="40" class="node" />
  <text x="260" y="95" class="text">Wake</text>

  <path d="M 310 90 L 360 90" class="arrow" marker-end="url(#arrow)" />

  <rect x="370" y="70" width="100" height="40" class="node" />
  <text x="420" y="95" class="text">Compute</text>

  <path d="M 420 110 Q 420 160 260 160 Q 100 160 100 110" class="arrow" marker-end="url(#arrow)" />
  <text x="260" y="150" class="text" style="font-size: 12px; fill: #64748b;">Repeat</text>
</svg>
