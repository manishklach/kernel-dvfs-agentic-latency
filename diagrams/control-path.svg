<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#fdfdfd" rx="10"/>
  <style>
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; fill: #333; }
    .label { font-weight: 600; text-anchor: middle; }
    .box { fill: #fff; stroke: #ddd; stroke-width: 1.5; rx: 6; }
    .arrow { stroke: #aaa; stroke-width: 1.5; fill: none; }
    .highlight { fill: #f0f7ff; stroke: #007aff; }
  </style>
  
  <g transform="translate(100, 20)">
    <rect x="0" y="0" width="400" height="60" class="box" />
    <text x="200" y="35" class="text label">IRQ / Timer / Workqueue / I/O / MM / VFS</text>
    
    <path d="M 200 60 V 90" class="arrow" marker-end="url(#arrowhead)"/>
    <rect x="125" y="90" width="150" height="40" class="box highlight" />
    <text x="200" y="115" class="text label">Completion</text>
    
    <path d="M 200 130 V 160" class="arrow" marker-end="url(#arrowhead)"/>
    <rect x="125" y="160" width="150" height="40" class="box highlight" />
    <text x="200" y="185" class="text label">Scheduler</text>
    
    <path d="M 200 200 V 230" class="arrow" marker-end="url(#arrowhead)"/>
    <rect x="125" y="230" width="150" height="40" class="box highlight" />
    <text x="200" y="255" class="text label">DVFS / cpuidle</text>
    
    <path d="M 200 270 V 300" class="arrow" marker-end="url(#arrowhead)"/>
    <rect x="125" y="300" width="150" height="40" class="box" />
    <text x="200" y="325" class="text label">Userspace Agent</text>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa" />
    </marker>
  </defs>
</svg>
